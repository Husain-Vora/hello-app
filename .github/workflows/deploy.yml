name: Node.js CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Ensure we are starting from the base home directory
            cd /home/ubuntu

            # 2. Setup the project folder if it doesn't exist
            if [ ! -d "hello-app" ]; then
              git clone git@github.com:Husain-Vora/hello-app.git
            fi

            # 3. Enter the folder, pull latest code, and install dependencies
            cd /home/ubuntu/hello-app
            git pull origin main
            npm install

            # 4. Global install of PM2 (just in case)
            sudo npm install -g pm2

            # 5. Restart the application
            # We use 'pm2 start' from within the directory to ensure paths are correct
            pm2 delete hello-app || true
            pm2 start index.js --name "hello-app"
            
            # 6. Save PM2 list so it restarts on server reboot
            pm2 save